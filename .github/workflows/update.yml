name: update-results

on:
  schedule:
    - cron: "0 3 * * *"   # 毎日 03:00 UTC = 12:00 JST
  workflow_dispatch:        # 手動実行も可（テスト用）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch & build results.json
        run: node scripts/update-results.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "wc2026-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "chore: update results $(date -u +%FT%TZ)"
            git push
          else
            echo "No changes to results.json"
          fi
