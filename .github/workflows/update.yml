name: update-results

on:
  schedule:
    # 3時間おき／UTCの:17分（混雑する正時を回避）
    # JST換算: 02:17, 05:17, 08:17, 11:17, 14:17, 17:17, 20:17, 23:17
    - cron: "17 */3 * * *"
  workflow_dispatch:        # 手動実行も可

permissions:
  contents: write

# 実行が重ならないようにする（push競合の防止）
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch & build results.json
        run: node scripts/update-results.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "wc2026-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "chore: update results $(date -u +%FT%TZ)"
            git push
          else
            echo "No changes to results.json"
          fi
